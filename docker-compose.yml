# Run this demo with Docker; the image bundles the Phlo engine:
#   composer install         (pulls Phlo CMS into vendor/)
#   docker compose up   ->   shop:  http://localhost
#                            admin: http://localhost:8081
#
# One container serves both faces: docker/Caddyfile listens on :80 (the
# storefront) and on :8081 (the Phlo CMS admin, marked with PHLO_ADMIN=1).
# Port taken, or running a second demo? PORT=8080 ADMIN_PORT=8082 docker compose up.
services:
  app:
    image: ghcr.io/q-ainl/phlo
    ports:
      - "${PORT:-80}:80"
      - "${ADMIN_PORT:-8081}:8081"
    volumes:
      - .:/app
      - ./docker/Caddyfile:/etc/frankenphp/Caddyfile:ro
